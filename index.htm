<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    

    <div class="modal-overlay" style="display: none;">
      <div id="modal"  >
        <img src="/resources/checkIcon.png" alt="this is an image">
        <span>Success!</span>
        <p class="message">You have successfully saved a new task</p>
      </div>
    </div>

    <div class="card">
      <header class="header-task">
        <span class="title">Todo List </span>
      </header>

      <main class="main-task">
        <section class="input-container">
          <input type="text" id="addtask" placeholder="Add a new task..." />
          <img src="/resources/add.png" class="save-task">
          <span class="errorMessage">You should enter a task</span>
        </section>

        <section class="tasks-section">
          <ul class="task-list"></ul>
        </section>
      </main>

      <footer class="filter-buttons">
        <button class="btn" id="btn-all">All</button>
        <button class="btn" id="btn-active">Active</button>
        <button class="btn" id="btn-completed">Completed</button>
      </footer>
    </div>

  </body>
  <script type="text/javascript" src="main.js"></script>
</html>
