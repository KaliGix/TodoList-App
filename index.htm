<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo List</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="modal-overlay">
      <div id="modal">
        <img src="/resources/checkIcon.png" alt="this is an image" id="icon-message" />
        <span id="modal-message-title">Success!</span>
        <p class="message"></p>
      </div>
    </div>

    <div class="card">
      <header class="header-task">
        <span class="title">Todo List </span>
      </header>

      <main class="main-task">
        <section class="input-container">
          <input
            type="text"
            id="addtask"
            placeholder="Add a new task..."
            autocomplete="off"
          />
          <img src="/resources/add.png" class="save-task" />
        </section>
        <section class="errorMessage">
          <span>You should enter a task</span>
          <img src="/resources/error.png" class="error-icon">
        </section>

        <section class="tasks-section">
          <ul class="task-list"></ul>
        </section>
      </main>

      <footer class="filter-buttons">
        <button class="btn" id="btn-all">All</button>
        <button class="btn" id="btn-active">Active</button>
        <button class="btn" id="btn-completed">Completed</button>
      </footer>
    </div>
  </body>
  <script type="text/javascript" src="main.js"></script>
</html>
